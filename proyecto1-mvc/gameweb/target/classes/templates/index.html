<!DOCTYPE html>
<!-- Espacio de nombres Thymeleaf: th:* activa la sintaxis de plantilla -->
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Catálogo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background: #f5f5f5; }
        h1   { color: #333; }
        .grid { display: flex; flex-wrap: wrap; gap: 1rem; }
        .card {
            background: white; border-radius: 8px; padding: 1rem;
            width: 200px; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .card img  { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; }
        .card h3   { margin: 0.5rem 0 0.25rem; font-size: 1rem; }
        .card p    { font-size: 0.85rem; color: #666; margin: 0; }
        .badge     { display: inline-block; background: #3498db; color: white;
                     font-size: 0.7rem; padding: 2px 6px; border-radius: 12px; margin-top: 6px; }
        a          { text-decoration: none; }
    </style>
</head>
<body>

    <!-- th:text reemplaza el contenido del elemento con el valor del atributo del modelo -->
    <h1 th:text="${titulo}">Catálogo de Juegos</h1>
    <p>Total de juegos:
        <!-- th:text con expresión SpEL -->
        <strong th:text="${#lists.size(juegos)}">0</strong>
    </p>

    <div class="grid">
        <!-- th:each itera la lista "juegos" del modelo -->
        <div class="card" th:each="juego : ${juegos}">

            <!-- th:src y th:alt para atributos HTML dinámicos -->
            <img th:src="${juego.imagen}"
                 th:alt="${juego.nombre}"
                 onerror="this.src='https://via.placeholder.com/200x120?text=Juego'">

            <!-- th:text para texto del elemento -->
            <h3 th:text="${juego.nombre}">Nombre</h3>
            <p  th:text="${juego.descripcion}">Descripción</p>
            <span class="badge" th:text="${juego.genero}">Género</span>

            <!-- th:href para enlaces dinámicos -->
            <br><br>
            <a th:href="@{/portal/detalle(nombre=${juego.nombre})}">Ver detalle →</a>
        </div>
    </div>

</body>
</html>
