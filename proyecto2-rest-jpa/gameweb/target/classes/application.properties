spring.application.name=gameweb
server.port=8080

# ─── Datasource ────────────────────────────────────────────────────────────
# Estos valores son sobreescritos por las variables de entorno del docker-compose
spring.datasource.url=jdbc:mysql://localhost:3306/gameweb_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=gameuser
spring.datasource.password=game1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────────────────
# update → crea/actualiza tablas automáticamente al iniciar
# (en producción usar "validate" o migraciones Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
